<!DOCTYPE html>
<html lang="Es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/registro.css">
    <title>Registro</title>
</head>
<body>
    <a href="index.html">
        <img src="../IMG/flecha.png" class="boton-volver" alt="Volver">
    </a>

    <div class="titulo-registro">
        Registro
    </div>

    <div class="formulario-registro">
        <input type="text" placeholder="Nombre Completo..." class="campo">
        <input type="email" placeholder="Correo Electrónico..." class="campo">

        <p class="pregunta">¿Qué eres en tu iglesia?</p>

        <div class="contenedor-opciones">
            <label class="opcion-blanca">
                <input type="radio" name="cargo" value="siervo">
                <span>Siervo</span>
            </label>
            <label class="opcion-blanca">
                <input type="radio" name="cargo" value="lider">
                <span>Líder</span>
            </label>
        </div>

        <input type="password" placeholder="Contraseña..." class="campo">
    
        <p class="texto-pequeno">¡Recuerda la contraseña, la necesitarás después!</p>

        <button type="button" class="boton-blanco-grande">Guardar</button>
        <a href="/HTML/inicio_sesion.html" class="enlace-final">¿Ya tienes una cuenta?</a>
    </div>


    <div class="barra-inferior">
        <div class="footer-izquierdo">
            <img src="../IMG/Logo MDM.png" alt="Logo" class="icono-footer">
            <span class="texto-footer">Manager de Ministerios</span>
        </div>
        <div class="footer-derecho">
            <img src="../IMG/logoSena.png" alt="Logo 2" class="icono-footer">
        </div>
    </div>
</body>
</html>
