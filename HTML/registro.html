<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Manager De Ministerios</title>
    <link rel="stylesheet" href="../CSS/registro.css">
</head>
<body>
    
    <!-- Botón de retorno a bienvenida -->
    <a href="/MDM/HTML/index.html">
        <img src="../IMG/flecha.png" class="boton-volver" alt="Volver a inicio">
    </a>

    <!-- Encabezado del módulo -->
    <div class="titulo-registro">
        Registro
    </div>

    <!-- Formulario de inscripción -->
    <form action="../PHP/envio_registro.php" method="POST" class="formulario-registro">
        
        <!-- Campos de datos básicos -->
        <input type="text" name="nombre" placeholder="Nombre Completo..." class="campo" required>
        <input type="email" name="email" placeholder="Correo Electrónico..." class="campo" required>

        <!-- Selección de rol o cargo -->
        <p class="pregunta">¿Qué eres en tu iglesia?</p>

        <div class="contenedor-opciones">
            <label class="opcion-blanca">
                <input type="radio" name="cargo" value="siervo" required>
                <span>Siervo</span>
            </label>
            <label class="opcion-blanca">
                <input type="radio" name="cargo" value="lider">
                <span>Líder</span>
            </label>
        </div>

        <!-- Credenciales de acceso -->
        <input type="password" name="password" placeholder="Contraseña..." class="campo" required>
        <p class="texto-pequeno">¡Recuerda la contraseña, la necesitarás después!</p>

        <!-- Control de envío y enlace alternativo -->
        <button type="submit" class="boton-blanco-grande">Guardar</button>
        <a href="/MDM/HTML/inicio_sesion.html" class="enlace-final">¿Ya tienes una cuenta?</a>
    </form>

    <!-- Barra inferior institucional -->
    <div class="barra-inferior">
        <div class="footer-izquierdo">
            <img src="../IMG/Logo MDM.png" alt="Logo Manager de Ministerios" class="icono-footer">
            <span class="texto-footer">Manager de Ministerios</span>
        </div>
        <div class="footer-derecho">
            <img src="../IMG/logoSena.png" alt="Logo de la institución SENA" class="icono-footer">
        </div>
    </div>
</body>
</html>
