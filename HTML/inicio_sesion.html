<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Manager De Ministerios</title>
    <link rel="stylesheet" href="../CSS/inicio_sesion.css">
</head>
<body>

    <!-- Botón de retorno a bienvenida -->
    <a href="/MDM/HTML/index.html">
        <img src="../IMG/flecha.png" class="boton-volver" alt="Volver a la página de bienvenida">
    </a>

    <!-- Encabezado del módulo -->
    <div class="titulo-insesion">
        Iniciar Sesión
    </div>
    
    <!-- Formulario de autenticación -->
    <form action="http://localhost/MDM/PHP/login.php" method="POST" class="formulario-ingresar">
            
        <!-- Campos de credenciales -->
        <input type="email" name="email" placeholder="Correo Electrónico..." class="campo" required>
        <input type="password" name="password" placeholder="Contraseña..." class="campo" required>

        <!-- Control de envío -->
        <button type="submit" class="boton-blanco-grande">Ingresar</button>
        
        <!-- Enlace de navegación alternativo -->
        <a href="/MDM/HTML/registro.html" class="enlace-final">¿No tienes una cuenta?</a>

    </form>

    <!-- Barra inferior institucional -->
    <div class="barra-inferior">
        <div class="footer-izquierdo">
            <img src="../IMG/Logo MDM.png" alt="Logo Manager de Ministerios" class="icono-footer">
            <span class="texto-footer">Manager de Ministerios</span>
        </div>
        <div class="footer-derecho">
            <img src="../IMG/logoSena.png" alt="Logo de la institución SENA" class="icono-footer">
        </div>
    </div>
</body>
</html>
